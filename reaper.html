<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELRON STORE - REAPER</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial,sans-serif;
text-align:center;
}

header{
background:#000;
padding:20px;
font-size:30px;
font-weight:bold;
}

img{
width:320px;
max-width:90%;
border-radius:15px;
margin-top:20px;
}

button{
padding:15px 30px;
margin:10px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

select{
padding:10px;
font-size:18px;
margin-top:20px;
}
</style>

</head>

<body>

<header>VELRON STORE</header>

<h1>Dark Reaper Baskılı Siyah Tişört</h1>

<img id="urun" src="tişört5.jpg">

<br>

<select id="beden">
<option value="">Beden Seçiniz</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<br>

<button onclick="onceki()">◀</button>
<button onclick="sonraki()">▶</button>

<h2>549 TL</h2>

<button onclick="favoriyeEkle()">❤️ Favorilere Ekle</button>

<button onclick="sepeteEkle()">🛒 Sepete Ekle</button>

<button onclick="satinal()">⚡ Satın Al</button>

<script>

const fotograflar=[
"tişört5.jpg",
"tişört6.jpg",
"tişört7.jpg",
"tişört8.jpg"
];

let sira=0;

function sonraki(){
sira++;
if(sira>=fotograflar.length)sira=0;
document.getElementById("urun").src=fotograflar[sira];
}

function onceki(){
sira--;
if(sira<0)sira=fotograflar.length-1;
document.getElementById("urun").src=fotograflar[sira];
}

let sepet = JSON.parse(localStorage.getItem("sepet")) || [];

function sepeteEkle(){

const giris = localStorage.getItem("giris");

if(giris!="true"){
alert("Sepete ürün ekleyebilmek için önce giriş yapmalısınız.");
window.location.href="giris.html";
return;
}

const beden = document.getElementById("beden").value;

if(beden==""){
alert("Lütfen beden seçiniz.");
return;
}

sepet.push({
urun:"Dark Reaper Baskılı Siyah Tişört",
fiyat:549,
beden:beden
});

localStorage.setItem("sepet",JSON.stringify(sepet));

alert("Ürün sepete eklendi.");

}

function favoriyeEkle(){

const giris = localStorage.getItem("giris");

if(giris!="true"){
alert("Favorilere eklemek için önce giriş yapmalısınız.");
window.location.href="giris.html";
return;
}

let favoriler = JSON.parse(localStorage.getItem("favoriler")) || [];

favoriler.push({
urun:"Dark Reaper Baskılı Siyah Tişört",
fiyat:549
});

localStorage.setItem("favoriler",JSON.stringify(favoriler));

alert("❤️ Ürün favorilere eklendi.");

}

</script>

</body>

<div style="padding:15px;">
<a href="#" onclick="history.back()" style="
color:white;
text-decoration:none;
font-size:22px;
font-weight:bold;
">
← Geri
</a>
</div>

</html>
