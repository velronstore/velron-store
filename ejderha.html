<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELRON STORE - Japon Ejderhası</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
text-align:center;
}

header{
background:#000;
padding:20px;
font-size:28px;
font-weight:bold;
}

#urun{
width:320px;
max-width:90%;
border-radius:15px;
margin-top:25px;
box-shadow:0 0 20px rgba(255,255,255,.08);
}

h1{
margin-top:20px;
font-size:30px;
}

select{
margin-top:20px;
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:14px 28px;
margin:10px;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.fiyat{
font-size:32px;
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<header>VELRON STORE</header>

<h1>Japon Ejderhası Baskılı Siyah Tişört</h1>

<div style="position:relative;display:inline-block;">

<img id="urun" src="tshirt.jpg">

<div id="kalp" onclick="favoriyeEkle()" style="
position:absolute;
top:10px;
right:10px;
font-size:30px;
cursor:pointer;
background:rgba(0,0,0,.4);
border-radius:50%;
padding:6px;
">
🤍
</div>

</div>

<br>

<select id="beden">
<option value="">Beden Seçiniz</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<br>

<button onclick="onceki()">◀</button>
<button onclick="sonraki()">▶</button>

<div class="fiyat">499 TL</div>



<button onclick="sepeteEkle()">🛒 Sepete Ekle</button>

<button onclick="satinal()">⚡ Satın Al</button>

<script>

const fotograflar=[
"tshirt.jpg",
"tshirt2.jpg",
"tshirt3.jpg",
"tshirt4.jpg"
];

let sira=0;

function sonraki(){
sira++;
if(sira>=fotograflar.length)sira=0;
document.getElementById("urun").src=fotograflar[sira];
}

function onceki(){
sira--;
if(sira<0)sira=fotograflar.length-1;
document.getElementById("urun").src=fotograflar[sira];
}

function sepeteEkle(){

const giris=localStorage.getItem("giris");

if(giris!="true"){
alert("Sepete ürün ekleyebilmek için önce giriş yapmalısınız.");
window.location.href="giris.html";
return;
}

const beden=document.getElementById("beden").value;

if(beden==""){
alert("Lütfen beden seçiniz.");
return;
}

let sepet=JSON.parse(localStorage.getItem("sepet")) || [];

sepet.push({
urun:"Japon Ejderhası Baskılı Siyah Tişört",
fiyat:499,
beden:beden
});

localStorage.setItem("sepet",JSON.stringify(sepet));


alert("✅️ Ürün sepete eklendi.");
}

function favoriyeEkle(){

const giris=localStorage.getItem("giris");

if(giris!="true"){
alert("Favorilere eklemek için önce giriş yapmalısınız.");
window.location.href="giris.html";
return;
}

let favoriler=JSON.parse(localStorage.getItem("favoriler")) || [];

favoriler.push({
urun:"Japon Ejderhası Baskılı Siyah Tişört",
fiyat:499
});

localStorage.setItem("favoriler",JSON.stringify(favoriler));

document.getElementById("kalp").innerHTML = "❤️";

alert("❤️ Ürün favorilere eklendi.");
}

function satinal(){

const giris=localStorage.getItem("giris");

if(giris!="true"){
alert("Sipariş verebilmek için önce giriş yapmalısınız.");
window.location.href="giris.html";
return;
}

const beden=document.getElementById("beden").value;

if(beden==""){
alert("Lütfen beden seçiniz.");
return;
}

sepeteEkle();

window.location.href="teslimat.html";
}

</script>

</body>

<div style="
position:fixed;
top:15px;
left:15px;
z-index:9999;
">
<a href="#" onclick="history.back()" style="
color:white;
text-decoration:none;
font-size:26px;
font-weight:bold;
">
←
</a>
</div>

</html>
