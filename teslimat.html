<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teslimat Bilgileri</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
margin:0;
}

header{
background:#000;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.kutu{
max-width:420px;
margin:30px auto;
background:#222;
padding:25px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<header>VELRON STORE</header>

<div class="kutu">

<h2>Teslimat Bilgileri</h2>

<input type="text" id="ad" placeholder="Ad Soyad">

<input type="tel" id="telefon" placeholder="Telefon Numarası">

<input type="text" id="il" placeholder="İl">

<input type="text" id="ilce" placeholder="İlçe">

<textarea id="adres" rows="4" placeholder="Açık Adres"></textarea>

<button onclick="kaydet()">Siparişi Tamamla</button>

</div>

<script>

function kaydet(){

const ad=document.getElementById("ad").value.trim();
const telefon=document.getElementById("telefon").value.trim();
const il=document.getElementById("il").value.trim();
const ilce=document.getElementById("ilce").value.trim();
const adres=document.getElementById("adres").value.trim();

if(ad==""||telefon==""||il==""||ilce==""||adres==""){
alert("Lütfen tüm alanları doldurun.");
return;
}

localStorage.setItem("teslimat",JSON.stringify({
ad,
telefon,
il,
ilce,
adres
}));

alert("Siparişiniz alındı. Teşekkür ederiz!");

window.location.href="index.html";

}

</script>

</body>
</html>
