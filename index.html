<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELRON STORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
position:sticky;
top:0;
background:#000;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 18px;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:3px;
}

.icon{
font-size:22px;
cursor:pointer;
text-decoration:none;
color:white;
}

.kargo{
background:#1b1b1b;
padding:10px;
text-align:center;
font-size:13px;
font-weight:bold;
border-bottom:1px solid #333;
}

.banner{

height:220px;
background:url("banner.jpg") center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

}

.banner h1{

font-size:38px;
margin-bottom:10px;

}

.banner p{

color:#ddd;

}

.banner button{

margin-top:20px;
padding:12px 30px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

.baslik{

display:flex;
justify-content:space-between;
align-items:center;
padding:25px 18px 10px;

}

.baslik h2{

font-size:22px;

}

.baslik a{

color:white;
text-decoration:none;

}

.urunler{

display:grid;
grid-template-columns:repeat(2,160px);
justify-content:center;
gap:18px;
padding-bottom:30px;

}

.kart{
background:#1a1a1a;
border-radius:18px;
padding:15px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.kart:hover{
transform:scale(1.03);
}

.kart img{
width:100%;
border-radius:15px;
display:block;
}

.kart h3{
margin-top:12px;
font-size:18px;
}

.kart p{
margin-top:8px;
font-size:18px;
font-weight:bold;
}

<b>VELRON STORE</b><br><br>

© 2026 Tüm Hakları Saklıdır.

</footer>

<div class="baslik">
<h2>Yeni Koleksiyon</h2>
<a href="#">Tümünü Gör →</a>
</div>

<div class="urunler">

<div class="kart" onclick="location.href='ejderha.html'">
<img src="tshirt.jpg" style="width:100%;border-radius:15px;">
<h3>DRAGON</h3>
<p>499 TL</p>
</div>

<div class="kart" onclick="location.href='reaper.html'">
<img src="tişört5.jpg" style="width:100%;border-radius:15px;">
<h3>REAPER</h3>
<p>549 TL</p>
</div>

<div class="kart">
<img src="tshirt2.jpg" style="width:100%;border-radius:15px;">
<h3>RAVEN</h3>
<p>499 TL</p>
</div>

<div class="kart">
<img src="tshirt3.jpg" style="width:100%;border-radius:15px;">
<h3>SAMURAI</h3>
<p>499 TL</p>
</div>

</div>

<div class="baslik">
<h2>Neden Velron?</h2>
</div>

<div style="padding:25px;text-align:center;line-height:35px;">
🚚 Hızlı Kargo<br>
⭐ Premium Kalite<br>

</div>

<footer style="background:#000;padding:30px;text-align:center;">
<h2>VELRON STORE</h2>
<p>© 2026 Tüm Hakları Saklıdır.</p>
</footer>

</body>
</html>
