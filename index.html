<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELRON STORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:16px;
}

.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
color:#bbb;
margin-bottom:25px;
}

.hero img{
width:320px;
max-width:90%;
border-radius:18px;
box-shadow:0 0 20px rgba(255,255,255,.1);
}

.fiyat{
font-size:32px;
margin-top:20px;
font-weight:bold;
}

button{
margin-top:20px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ddd;
}

</style>

</head>

<body>

<header>

<div class="logo">
VELRON STORE
</div>

<nav>
<a href="#">Ana Sayfa</a>
<a href="#">Ürünler</a>
<a href="#">İletişim</a>
</nav>

</header>

<section class="hero">

<h1>Japon Ejderhası Tişört</h1>

<p>Premium Baskı • S • M • L • XL</p>

<img id="urun" src="tshirt.jpg" alt="Velron Tişört">

<br><br>

<button onclick="onceki()">◀</button>
<button onclick="sonraki()">▶</button>

<div class="fiyat">
499 TL
</div>

<button>
Satın Al
</button>

</section>
<script>
const fotograflar = [
"tshirt.jpg",
"tshirt2.jpg",
"tshirt3.jpg",
"tshirt4.jpg"
];

let sira = 0;

function sonraki() {
  sira++;
  if (sira >= fotograflar.length) sira = 0;
  document.getElementById("urun").src = fotograflar[sira];
}

function onceki() {
  sira--;
  if (sira < 0) sira = fotograflar.length - 1;
  document.getElementById("urun").src = fotograflar[sira];
}
</script>

</body>
</html>
