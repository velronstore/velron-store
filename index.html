<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELRON STORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:16px;
}

.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
color:#bbb;
margin-bottom:25px;
}

.hero img{
width:320px;
max-width:90%;
border-radius:18px;
box-shadow:0 0 20px rgba(255,255,255,.1);
}

.fiyat{
font-size:32px;
margin-top:20px;
font-weight:bold;
}

button{
margin-top:20px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ddd;
}

</style>

</head>

<body>

<header>

<div class="logo">
VELRON STORE
</div>

<nav>
<a href="#">Ana Sayfa</a>
<a href="#">Ürünler</a>
<a href="#">İletişim</a>
<a href="#" id="sepet" onclick="sepetiGoster()">🛒 (0)</a>
</nav>

</header>

<section class="hero">

<h1>Japon Ejderhası Tişört</h1>

<p>Premium Baskı • S • M • L • XL</p>

<img id="urun" src="tshirt.jpg" alt="Velron Tişört">

<br><br>

<select id="beden">
  <option value="">Beden Seçiniz</option>
  <option value="S">S</option>
  <option value="M">M</option>
  <option value="L">L</option>
  <option value="XL">XL</option>
</select>

<br><br>

<br><br>

<button onclick="onceki()">◀</button>
<button onclick="sonraki()">▶</button>

<div class="fiyat">
499 TL
</div>

<button onclick="sepeteEkle()">
🛒 Sepete Ekle
</button>

<br><br>

<button onclick="satinal()">
⚡ Satın Al
</button>

<div id="sepetKutusu" style="
display:none;
position:fixed;
top:80px;
right:20px;
width:300px;
background:#222;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.5);
z-index:999;
">
<h2>🛒 Sepetim</h2>

<div id="sepetListe"></div>

<h3 id="toplamFiyat">Toplam: 0 TL</h3>
</div>

<h2 style="margin-top:50px;">Yeni Koleksiyon</h2>

<div style="
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
">

<div style="width:180px;background:#222;border-radius:12px;padding:10px;">
<img src="tshirt.jpg" style="width:100%;border-radius:10px;">
<h3 style="font-size:16px;margin-top:10px;">Japon Ejderhası</h3>
<p>499 TL</p>
<button onclick="window.location='dragon.html'">İncele</button>
</div>

<div style="width:180px;background:#222;border-radius:12px;padding:10px;">
<img src="tshirt5.jpg" style="width:100%;border-radius:10px;">
<h3 style="font-size:16px;margin-top:10px;">Samurai</h3>
<p>499 TL</p>
<button onclick="window.location='samurai.html'">İncele</button>
</div>

</div>

</section>


<script>
const fotograflar = [
"tshirt.jpg",
"tshirt2.jpg",
"tshirt3.jpg",
"tshirt4.jpg"
];

fotograflar.forEach(function(resim) {
  const img = new Image();
  img.src = resim;
});

let sira = 0;

function sonraki() {
  sira++;
  if (sira >= fotograflar.length) sira = 0;
  document.getElementById("urun").src = fotograflar[sira];
}

function onceki() {
  sira--;
  if (sira < 0) sira = fotograflar.length - 1;
  document.getElementById("urun").src = fotograflar[sira];
}
function satinal() {
  const beden = document.getElementById("beden").value;

  if (beden === "") {
    alert("Lütfen beden seçiniz.");
    return;
  }

  alert("Seçilen beden: " + beden);
}

let sepet = JSON.parse(localStorage.getItem("sepet")) || [];

document.getElementById("sepet").innerHTML = "🛒 (" + sepet.length + ")";

function sepeteEkle() {
  const beden = document.getElementById("beden").value;

  if (beden === "") {
    alert("Lütfen beden seçiniz.");
    return;
  }

  sepet.push({
    urun: "Japon Ejderhası Tişört",
    fiyat: 499,
    beden: beden
  });

localStorage.setItem("sepet", JSON.stringify(sepet));

document.getElementById("sepet").innerHTML = "🛒 (" + sepet.length + ")";

  alert("Ürün sepete eklendi.\nSepetteki ürün sayısı: " + sepet.length);
}

function sepetiGoster() {

  const kutu = document.getElementById("sepetKutusu");
  const liste = document.getElementById("sepetListe");

  if (kutu.style.display === "block") {
    kutu.style.display = "none";
    return;
  }

  kutu.style.display = "block";
  liste.innerHTML = "";

  let toplam = 0;

  if (sepet.length === 0) {
    liste.innerHTML = "<p>Sepetiniz boş.</p>";
    document.getElementById("toplamFiyat").innerHTML = "Toplam: 0 TL";
    return;
  }

  for (let i = 0; i < sepet.length; i++) {

    liste.innerHTML += `
      <div style="border:1px solid #555;padding:15px;margin:10px;border-radius:10px;">
        <b>${sepet[i].urun}</b><br>
        Beden: ${sepet[i].beden}<br>
        Fiyat: ${sepet[i].fiyat} TL
      </div>
    `;

    toplam += sepet[i].fiyat;
  }

  document.getElementById("toplamFiyat").innerHTML =
    "Toplam: " + toplam + " TL";
}

</script>


</body>
</html>
