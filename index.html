<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELRON STORE</title>

<style>



*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:0px 5px;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

.logo{
font-size:28px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:16px;
}

.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
color:#bbb;
margin-bottom:25px;
}

.hero img{
width:320px;
max-width:90%;
border-radius:18px;
box-shadow:0 0 20px rgba(255,255,255,.1);
}

.fiyat{
font-size:32px;
margin-top:20px;
font-weight:bold;
}

button{
margin-top:20px;
padding:10px 22px;
font-size:15px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ddd;
}

.banner{
    width:100%;
    margin-top:10px;
    overflow:hidden;
}

.banner img{
    width:100%;
    display:block;
    transform: scale(1.20) translateY(20px);
}

.kargo{
background:#111;
color:white;
text-align:center;
padding:8px;
font-size:13px;
font-weight:bold;
border-top:1px solid #333;
border-bottom:1px solid #333;
letter-spacing:1px;
}

div[onclick]:active{
    transform:scale(0.97);
}

</style>

</head>

<body>

<header>

<button onclick="menuAc()" style="
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
margin-left:-15px;
margin-top:-4px;
">
☰
</button>

<div style="
position:absolute;
left:50%;
transform:translateX(-55%);
font-size:20px;
font-weight:bold;
letter-spacing:2px;
">
VELRON
</div>

<a href="#" id="sepet" onclick="sepetiGoster()"
style="color:white;text-decoration:none;font-size:18px;">
🛒
</a>

</header>

<div class="kargo">
🚚 2 TİŞÖRT ALANA KARGO BEDAVA
</div>

<div class="banner">
<img src="banner.jpg">
</div>

<div style="
display:grid;
grid-template-columns:repeat(2,130px);
justify-content:center;
gap:15px;
margin:40px 0;
">

<div onclick="location.href='ejderha.html'" style="
width:130px;
background:#1b1b1b;
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.2s;
">
<img src="tshirt.jpg" style="width:115px;height:155px;object-fit:cover;border-radius:14px;box-shadow:0 5px 15px rgba(0,0,0,.4);">
<p>499 TL</p>
</div>

<div onclick="location.href='ejderha.html'" style="
width:130px;
background:#1b1b1b;
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.2s;
">
<img src="tişört5.jpg" style="width:115px;height:155px;object-fit:cover;border-radius:14px;box-shadow:0 5px 15px rgba(0,0,0,.4);">
<p>549 TL</p>
</div>

</div>


<script>
const fotograflar = [
"tshirt.jpg",
"tshirt2.jpg",
"tshirt3.jpg",
"tshirt4.jpg"
];

fotograflar.forEach(function(resim) {
  const img = new Image();
  img.src = resim;
});

let sira = 0;

function sonraki() {
  sira++;
  if (sira >= fotograflar.length) sira = 0;
  document.getElementById("urun").src = fotograflar[sira];
}

function onceki() {
  sira--;
  if (sira < 0) sira = fotograflar.length - 1;
  document.getElementById("urun").src = fotograflar[sira];
}
function satinal(){

const giris = localStorage.getItem("giris");

if(giris!="true"){
alert("Sipariş verebilmek için önce giriş yapmalısınız.");
window.location.href="giris.html";
return;
}

const beden = document.getElementById("beden").value;

if(beden==""){
alert("Lütfen beden seçiniz.");
return;
}

const sepet = JSON.parse(localStorage.getItem("sepet")) || [];

if(sepet.length==0){
alert("Lütfen önce ürünü sepete ekleyin.");
return;
}

window.location.href="teslimat.html";

}

let sepet = JSON.parse(localStorage.getItem("sepet")) || [];

document.getElementById("sepet").innerHTML = "🛒 (" + sepet.length + ")";

function sepeteEkle() {

const giris = localStorage.getItem("giris");

if(giris != "true"){
alert("Sepete ürün ekleyebilmek için önce giriş yapmalısınız.");
window.location.href = "giris.html";
return;
}
  const beden = document.getElementById("beden").value;

  if (beden === "") {
    alert("Lütfen beden seçiniz.");
    return;
  }

  sepet.push({
    urun: "Japon Ejderhası Tişört",
    fiyat: 499,
    beden: beden
  });

localStorage.setItem("sepet", JSON.stringify(sepet));

document.getElementById("sepet").innerHTML = "🛒 (" + sepet.length + ")";

  alert("Ürün sepete eklendi.\nSepetteki ürün sayısı: " + sepet.length);
}

function sepetiGoster() {

  const kutu = document.getElementById("sepetKutusu");
  const liste = document.getElementById("sepetListe");

  if (kutu.style.display === "block") {
    kutu.style.display = "none";
    return;
  }

  kutu.style.display = "block";
  liste.innerHTML = "";

  let toplam = 0;

  if (sepet.length === 0) {
    liste.innerHTML = "<p>Sepetiniz boş.</p>";
    document.getElementById("toplamFiyat").innerHTML = "Toplam: 0 TL";
    return;
  }

  for (let i = 0; i < sepet.length; i++) {

liste.innerHTML += `
<div style="border:1px solid #555;padding:15px;margin:10px;border-radius:10px;">
<b>${sepet[i].urun}</b><br>
Beden: ${sepet[i].beden}<br>
Fiyat: ${sepet[i].fiyat} TL<br><br>

<button onclick="urunSil(${i})">🗑️ Sil</button>

</div>
`;

    toplam += sepet[i].fiyat;
  }

  document.getElementById("toplamFiyat").innerHTML =
    "Toplam: " + toplam + " TL";
}

function urunSil(index){

sepet.splice(index,1);

localStorage.setItem("sepet", JSON.stringify(sepet));

document.getElementById("sepet").innerHTML =
"🛒 (" + sepet.length + ")";

document.getElementById("sepetKutusu").style.display = "none";

sepetiGoster();

}

const hesap = JSON.parse(localStorage.getItem("hesap"));
const giris = localStorage.getItem("giris");

if(giris=="true" && hesap){

document.getElementById("hesabim").innerHTML="👤 "+hesap.ad;

document.getElementById("hesabim").href="#";

}

function favoriyeEkle(){

const giris = localStorage.getItem("giris");

if(giris!="true"){
alert("Favorilere eklemek için önce giriş yapmalısınız.");
window.location.href="giris.html";
return;
}

let favoriler = JSON.parse(localStorage.getItem("favoriler")) || [];

favoriler.push({
urun:"Japon Ejderha Baskılı Siyah Tişört",
fiyat:499
});

localStorage.setItem("favoriler",JSON.stringify(favoriler));

alert("❤️ Ürün favorilere eklendi.");

}

function menuAc(){
document.getElementById("menu").style.left="0";
document.getElementById("overlay").style.display="block";
}

function menuKapat(){
document.getElementById("menu").style.left="-200px";
document.getElementById("overlay").style.display="none";
}

</script>

<div id="overlay" onclick="menuKapat()" style="
display:none;
position:fixed;
top:0;
left:200px;
width:calc(100% - 260px);
height:100%;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
z-index:998;
"></div>

<div id="menu" style="
position:fixed;
top:0;
left:-200px;
width:200px;
height:100%;
background:#1a1a1a;
padding:20px;
transition:0.3s;
z-index:999;
">

<h2>VELRON STORE</h2>

<p><a href="hesabim.html" style="color:white;text-decoration:none;">👤 Hesabım</a></p>

<p><a href="#" style="color:white;text-decoration:none;">📞 İletişim</a></p>



</div>

</body>
</html>
